<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pikachu Match Game</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        background-color: #1a1a2e;
      }
      #game {
        border-radius: 8px;
      }
      #score-display {
        position: absolute;
        top: 20px;
        right: 20px;
        background-color: rgba(26, 26, 70, 0.9);
        color: #eaeaea;
        padding: 16px 24px;
        border-radius: 8px;
        font-size: 24px;
        font-weight: bold;
        z-index: 100;
      }
    </style>
  </head>
  <body>
    <canvas id="game"></canvas>
    <div id="score-display">Score: 0</div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
